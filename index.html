<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRPG Battle Clicker | Final Fantasy V Style</title>
    <!-- Google Fonts: VT323 e Press Start 2P para o verdadeiro sentimento retro 8/16-bits -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <!-- FontAwesome para ícones retro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Canvas para partículas de impacto neon -->
        <canvas id="particleCanvas"></canvas>

        <!-- Efeito de Flash de Impacto -->
        <div class="flash-overlay" id="flashOverlay"></div>

        <!-- Tela de Batalha (Estilo JRPG Clássico) -->
        <div class="battle-screen">
            
            <!-- Lado do Inimigo (Boss) -->
            <div class="enemy-side">
                <div class="enemy-sprite-container">
                    <div class="enemy-glow"></div>
                    <div class="enemy-monster-card" id="enemyCard"></div>
                </div>
                <!-- Nome e HP em cima do Boss (Estilo Retro) -->
                <div class="retro-boss-info">
                    <div class="boss-title" id="bossTitle">Carregando Batalha...</div>
                    <div class="boss-hp-box">
                        <div class="boss-hp-bar" id="bossHpBar" style="width: 100%;"></div>
                    </div>
                    <div class="boss-hp-text" id="bossHpText">10,000 / 10,000</div>
                </div>
            </div>

            <!-- Lado do Herói (Sprite animado) -->
            <div class="hero-side">
                <!-- O Sprite de 9 quadros em 3x3 -->
                <div class="character-sprite" id="characterSprite"></div>
                <div class="hero-shadow"></div>
            </div>

            <!-- Combo Counter JRPG Style -->
            <div class="combo-counter-retro" id="comboCounter">
                <span id="comboNumber">0</span> HITS!
            </div>
            
            <!-- Mensagem de Turno / Caixa de Diálogo do Jogo -->
            <div class="battle-message-box" id="battleMessageBox">
                Conflict Dragon apareceu! Pronto para a batalha.
            </div>
        </div>

        <!-- Painel de Menus Azul (Estilo Final Fantasy V de SNES) -->
        <div class="retro-menu-container">
            
            <!-- Coluna de Comandos (Ações) -->
            <div class="menu-commands-box">
                <ul class="command-list">
                    <li class="command-item active" id="btnAtacar">
                        <div class="pointing-hand"></div>
                        <span>⚔️ ATACAR</span>
                    </li>
                    <li class="command-item locked" id="btnGitPush">
                        <div class="pointing-hand"></div>
                        <span>🔥 GIT PUSH</span>
                    </li>
                    <li class="command-item" id="muteBtn">
                        <div class="pointing-hand"></div>
                        <span id="muteText">🔊 SOM ATIVO</span>
                    </li>
                </ul>
            </div>

            <!-- Coluna de Status da Party -->
            <div class="menu-status-box">
                <table class="status-table">
                    <thead>
                        <tr>
                            <th>NOME</th>
                            <th>HP</th>
                            <th>MP (Git)</th>
                            <th>ATB</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="character-row">
                            <td class="char-name">RAFAEL <span class="char-lvl">Lvl 99</span></td>
                            <td class="char-hp">
                                <span id="heroHpText">9999/9999</span>
                                <div class="mini-bar-bg"><div class="mini-bar hp" style="width: 100%;"></div></div>
                            </td>
                            <td class="char-mp">
                                <span id="specialPercent">0%</span>
                                <div class="mini-bar-bg"><div class="mini-bar mp" id="specialBar" style="width: 0%;"></div></div>
                            </td>
                            <td class="char-atb">
                                <div class="atb-bar-container">
                                    <div class="atb-bar" id="atbBar"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Console JRPG Terminal (Status de Rede) -->
        <div class="retro-console-box">
            <div class="console-title"><i class="fa-solid fa-code-branch"></i> NET-LOGS (API SIMULATION)</div>
            <div class="console-lines" id="consoleLogs">
                <div class="log-line">[SYSTEM] Iniciando FF5 Combat Engine... Pronto!</div>
            </div>
            
            <!-- Rodapé com estatísticas retro -->
            <div class="retro-stats-bar">
                <span>DANOS T.: <strong id="statDmg">0</strong></span>
                <span>ACERTOS: <strong id="statHits">0</strong></span>
                <span>CRÍTICOS: <strong id="statCrits">0%</strong></span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
